name: AI CI/CD

on:
  push:
    branches: [ "main", "dev", "test/**" ]
    paths:
      - 'ai/**'
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'ai/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/cukee-ai
          tags: |
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ai
          file: ./ai/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to GPU server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST_GPU }}
          username: ${{ secrets.SSH_USER_GPU }}
          key: ${{ secrets.SSH_KEY_GPU }}
          port: ${{ secrets.SSH_PORT_GPU || 22 }}
          source: "docker-compose.yaml"
          target: "~/app"

      - name: Deploy AI to GPU Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_GPU }}
          username: ${{ secrets.SSH_USER_GPU }}
          key: ${{ secrets.SSH_KEY_GPU }}
          port: ${{ secrets.SSH_PORT_GPU || 22 }}
          command_timeout: 30m
          script: |
            cd ~/app
            echo ${{ secrets.DOCKER_TOKEN }} | sudo docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            
            # Pull specific version
            sudo IMAGE_TAG=sha-${{ github.sha }} docker compose pull ai
            
            # AI 서비스 재시작
            sudo IMAGE_TAG=sha-${{ github.sha }} docker compose up -d ai
            
            sudo docker image prune -f

name: AI CI/CD

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - 'ai/**'
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'ai/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/cukee-ai
          tags: |
            type=raw,value=sha-${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ai
          file: ./ai/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/cukee-ai:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/cukee-ai:buildcache,mode=max

  deploy:
    needs: build-and-push
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to GPU Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST_GPU }}
          username: ${{ secrets.SSH_USER_GPU }}
          key: ${{ secrets.SSH_KEY_GPU }}
          port: ${{ secrets.SSH_PORT_GPU || 22 }}
          source: "docker-compose.yaml"
          target: "~/app"
          
      - name: Deploy to GPU Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_GPU }}
          username: ${{ secrets.SSH_USER_GPU }}
          key: ${{ secrets.SSH_KEY_GPU }}
          port: ${{ secrets.SSH_PORT_GPU || 22 }}
          command_timeout: 30m
          script: |
            cd ~/app
            
            # 1. Docker Login
            echo ${{ secrets.DOCKER_TOKEN }} | sudo docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            
            # 2. Update .env for AI Tag
            touch .env
            if grep -q "^AI_TAG=" .env; then
              sed -i "s/^AI_TAG=.*/AI_TAG=sha-${{ github.sha }}/" .env
            else
              echo "AI_TAG=sha-${{ github.sha }}" >> .env
            fi
            
            # 3. Pull & Up (AI Only)
            # 여기서는 Nginx를 건드리지 않음 (GPU 서버에는 Nginx 없거나 필요 없음)
            sudo docker compose pull ai
            sudo docker compose up -d --force-recreate --no-deps ai
            
            # 4. Cleanup
            sudo docker image prune -f

services:
  ai-server:
    container_name: cukee-ai-server
    build:
      context: .
      dockerfile: Dockerfile
    image: cukee-ai-server:latest
    
    # GPU 사용 설정
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
    # 포트 매핑
    ports:
      - "5000:5000"
    
    # 볼륨 마운트 - LoRA 어댑터들이 있는 model 폴더 연결
    volumes:
      - /home/ubuntu/model/Llama-3.1-8B-Instruct:/app/model/Llama-3.1-8B-Instruct:ro
      - ./logs:/app/logs
    
    # 환경 변수 파일
    env_file:
      - .env
    
    # 재시작 정책
    restart: unless-stopped
    
    # 네트워크 설정
    networks:
      - ai-network
    
    # 컨테이너가 정상 동작할 때까지 대기 (모델 로딩 시간 고려)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5m
    
    # 로깅 설정
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ai-network:
    driver: bridge

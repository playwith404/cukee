version: '3.8'

services:
  frontend:
    image: juin925/cukee-frontend:${FRONTEND_TAG}
    restart: always
    ports:
      - "3000:3000"
    networks:
      - app-network

  backend:
    image: juin925/cukee-backend:${BACKEND_TAG}
    # (선택) DB 접속 정보 등을 위해 .env 파일을 로드
    env_file:
      - .env
    restart: always
    ports:
      - "8000:8000"
    networks:
      - app-network

  ai:
    image: juin925/cukee-ai:${AI_TAG}
    env_file:
      - .env
    restart: always
    ports:
      - "5000:5000"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL 인증서 경로는 추후 실제 인증서 생성 후 마운트 필요
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    restart: always
    depends_on:
      - frontend
      - backend
      - ai
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
